<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigating bar</title> 

    <style type="text/css"> 
    *{ 
        text-decoration: none; 
    }
    .navbar{ 
        background: crimson; font-family: calibri; padding-right: 15px;padding-left: 15px; 
    }
    .navdiv{ 
        display: flex; align-items: center; justify-content: space-between;
    }
    .logo{ 
        color: white; font-size: 35px; font-weight: bold; font-weight: 700;
    }
    li{ 
        list-style: none; display: inline-block; margin: 0px 10px;
    }
    li a{ 
        color: white; font-size: 20px; font-weight: bold; font-weight: 700; margin: 0px 10px;
    }
    button { 
        color: black; font-size: 20px; font-weight: bold; font-weight: 700; margin: 0px 10px; border-radius: 10px;
    }


    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Inside Game</div>

            <li><a href="3.processing.html">Processing</a></li>
            <button><a href="#">Test 1</a></button>

        </ul>
    </nav>
    
</body>

</html>
